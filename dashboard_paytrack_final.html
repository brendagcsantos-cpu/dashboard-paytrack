<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Produtividade — Paytrack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{--bg:#060D1F;--surface:#0D1631;--surface2:#112050;--border:#1A2F6A;--accent:#F5C400;--accent2:#2563EB;--warn:#F5C400;--danger:#F05C5C;--purple:#60A5FA;--text:#EFF3FF;--text2:#7A8EBF;--text3:#3D4F80;--radius:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .logo{background:#F5C400;color:#0D1B3E;font-weight:700;font-size:13px;padding:6px 12px;border-radius:6px;letter-spacing:.5px;}
  .topbar h1{font-size:15px;font-weight:500;}
  .last-update{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
  .refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
  .refresh-btn:hover{border-color:#F5C400;color:#F5C400;}
  .main{padding:1.5rem 2rem;max-width:1600px;margin:0 auto;}
  .top-banner{background:linear-gradient(135deg,#0D1B3E,#112050);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .banner-title{font-size:20px;font-weight:700;}
  .banner-sub{font-size:13px;color:var(--text2);margin-top:3px;}
  .banner-period{font-family:'JetBrains Mono',monospace;font-size:13px;color:#F5C400;background:#0D1B3E;padding:6px 14px;border-radius:6px;border:1px solid #1E3A8A;}
  .controls-row{display:flex;gap:10px;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;}
  .ctrl-group{display:flex;}
  .ctrl-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:500;padding:7px 16px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
  .ctrl-btn:first-child{border-radius:8px 0 0 8px;}
  .ctrl-btn:last-child{border-radius:0 8px 8px 0;}
  .ctrl-btn:not(:first-child){border-left:none;}
  .ctrl-btn.active{background:var(--accent);border-color:#F5C400;color:#fff;}
  .ctrl-btn:hover:not(.active){background:var(--surface2);color:var(--text);}
  select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13px;padding:7px 12px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;outline:none;min-width:180px;}
  select:focus{border-color:#F5C400;}
  .metric-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.2rem;}
  .metric-tab{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
  .metric-tab.active{background:var(--accent);border-color:#F5C400;color:#fff;}
  .metric-tab:hover:not(.active){border-color:var(--text3);color:var(--text);}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .kpi-card.blue::before{background:var(--accent);}
  .kpi-card.green::before{background:var(--accent2);}
  .kpi-card.warn::before{background:var(--warn);}
  .kpi-card.danger::before{background:var(--danger);}
  .kpi-card.purple::before{background:var(--purple);}
  .kpi-card.teal::before{background:#2DD4BF;}
  .kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-weight:500;}
  .kpi-value{font-size:24px;font-weight:700;color:var(--text);line-height:1;font-family:'JetBrains Mono',monospace;}
  .kpi-sub{font-size:10px;color:var(--text3);margin-top:4px;}
  .kpi-sub2{font-size:10px;color:var(--text2);margin-top:2px;font-family:'JetBrains Mono',monospace;}
  .chart-grid{display:grid;gap:14px;margin-bottom:14px;}
  .chart-grid-2{grid-template-columns:1fr 1fr;}
  .chart-grid-3{grid-template-columns:2fr 1fr;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.4rem;}
  .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;}
  .card-title{font-size:13px;font-weight:600;color:var(--text);}
  .card-sub{font-size:11px;color:var(--text3);margin-top:2px;}
  .chart-wrap{position:relative;}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
  .legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;}
  td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:var(--surface2);}
  .num{font-family:'JetBrains Mono',monospace;}
  .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;}
  .badge-ok{background:#0D2255;color:#F5C400;}
  .badge-warn{background:#3B2A0D;color:#F59E0B;}
  .badge-bad{background:#3B0D0D;color:#F05C5C;}
  .badge-na{background:var(--surface2);color:var(--text3);}
  .meta-bar-wrap{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
  .meta-bar{height:100%;border-radius:3px;transition:width .6s ease;}
  .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
  .loading-overlay.hidden{display:none;}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:#F5C400;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:14px;color:var(--text2);}
  .divider{flex:1;}
  .day-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
  .day-filter-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;width:100%;}
  .day-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s;}
  .day-btn.active{background:var(--accent);border-color:#F5C400;color:#fff;font-weight:600;}
  .day-btn:hover:not(.active){border-color:var(--text3);color:var(--text);}
  .day-summary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .day-summary-item{font-size:12px;color:var(--text2);}
  .day-summary-item strong{color:var(--text);font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Carregando dados da planilha...</div>
</div>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">PAYTRACK</div>
    <h1>Dashboard de Produtividade</h1>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="refresh-btn" onclick="loadData()">↻ Atualizar</button>
  </div>
</div>
<div class="main">
  <div class="top-banner">
    <div>
      <div class="banner-title">Time de Atendimento</div>
      <div class="banner-sub">Produtividade diária · Meta: 40 atendimentos/dia</div>
    </div>
    <div class="banner-period">Junho 2026</div>
  </div>
  <div class="controls-row">
    <div class="ctrl-group">
      <button class="ctrl-btn active" onclick="setView('team',this)">Visão do Time</button>
      <button class="ctrl-btn" onclick="setView('diario',this)">Visão Diária</button>
      <button class="ctrl-btn" onclick="setView('individual',this)">Consultor Individual</button>
      <button class="ctrl-btn" onclick="setView('semana',this)">Comparar Semanas</button>
      <button class="ctrl-btn" onclick="setView('metas',this)">Metas</button>
      <button class="ctrl-btn" onclick="setView('qualidade',this)">Qualidade</button>
    </div>
    <select id="consultorSel" style="display:none" onchange="currentConsultor=this.value;render()"></select>
    <div class="divider"></div>
  </div>
  <div class="metric-tabs" id="metricTabs">
    <button class="metric-tab active" data-metric="total" onclick="setMetric('total',this)">Total</button>
    <button class="metric-tab" data-metric="tel" onclick="setMetric('tel',this)">Telefone</button>
    <button class="metric-tab" data-metric="chat" onclick="setMetric('chat',this)">WhatsApp</button>
    <button class="metric-tab" data-metric="zen" onclick="setMetric('zen',this)">Zendesk</button>
    <button class="metric-tab" data-metric="supplier" onclick="setMetric('supplier',this)">Supplier</button>
  </div>
  <div class="kpi-grid" id="kpiGrid"></div>
  <div id="chartsArea"></div>
  <div class="card" style="margin-bottom:1.5rem">
    <div class="card-header">
      <div><div class="card-title" id="tableTitle">Ranking do Time</div><div class="card-sub" id="tableSub">Total acumulado no período</div></div>
    </div>
    <div class="table-wrap"><table id="mainTable"></table></div>
  </div>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbxA4hOVqvbUTATrti8PM_uGR19ewE0WMAkAbbZ3cjLf12I_sTD4SIDzPGHH8cQAUe9f/exec';
const META_DIA=40;
const PALETTE=['#2563EB','#F5C400','#F59E0B','#60A5FA','#F05C5C','#93C5FD','#FBBF24','#2563EB','#818CF8','#F5C400'];
const CANAL_COLORS={tel:'#2563EB',chat:'#F5C400',zen:'#60A5FA',supplier:'#F59E0B'};
const WEEK_COLORS={S1:'#2563EB',S2:'#F5C400',S3:'#F59E0B',S4:'#60A5FA'};
const WEEK_MAP={S1:'01–07 jun',S2:'08–14 jun',S3:'15–21 jun',S4:'22–30 jun'};

let RAW={},names=[],currentView='team',currentMetric='total',currentConsultor='',currentDay='',charts={};

function timeToMin(t){if(!t||t==='-')return null;const s=String(t).trim();if(!s||s==='-')return null;const p=s.split(':');if(p.length===3){const h=parseInt(p[0])||0,m=parseInt(p[1])||0,sc=parseFloat(p[2])||0;if(h===0&&m===0&&sc===0)return null;return h*60+m+sc/60;}if(p.length===2){return(parseInt(p[0])||0)+(parseInt(p[1])||0)/60;}return null;}
function fmtMin(m){if(m===null||m===undefined)return'—';const total=Math.round(m*60);const min=Math.floor(total/60);const sec=total%60;return String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
function totalFor(n,m){return(RAW[n]||[]).reduce((s,r)=>s+(r[m]||0),0);}
function avgSLA(n,field){const f=field||'sla';const v=(RAW[n]||[]).filter(r=>r[f]!==null&&typeof r[f]==='number'&&r[f]>=0).map(r=>r[f]);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function avgCSAT(n,ch){const v=(RAW[n]||[]).filter(r=>r['csat_'+ch]!==null&&typeof r['csat_'+ch]==='number').map(r=>r['csat_'+ch]);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function avgTMA(n,ch){const v=(RAW[n]||[]).map(r=>timeToMin(r['tma_'+ch])).filter(x=>x!==null&&x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function avgTME(n,ch){const v=(RAW[n]||[]).map(r=>timeToMin(r['tme_'+ch])).filter(x=>x!==null&&x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function getAllDates(){const s=new Set();names.forEach(n=>(RAW[n]||[]).forEach(r=>s.add(r.data)));return[...s].sort((a,b)=>{const[da,ma]=a.split('/').map(Number);const[db,mb]=b.split('/').map(Number);return ma*100+da-(mb*100+db);});}
function getWeek(d){const[day]=d.split('/').map(Number);return day<=7?'S1':day<=14?'S2':day<=21?'S3':'S4';}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function slaClass(v){return v===null?'badge-na':v>=90?'badge-ok':v>=70?'badge-warn':'badge-bad';}
function slaText(v){return v===null?'N/A':Math.round(v)+'%';}
function chartOpts(noLegend,extraScales){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:!noLegend,labels:{color:'#8B93A8',font:{size:11},boxWidth:10}},tooltip:{backgroundColor:'#1E2333',borderColor:'#2A3045',borderWidth:1,titleColor:'#E8ECF4',bodyColor:'#8B93A8',padding:10}},scales:extraScales||{y:{beginAtZero:true,ticks:{color:'#555E75',font:{size:10}},grid:{color:'#2A3045'}},x:{ticks:{color:'#555E75',font:{size:10},maxRotation:45},grid:{display:false}}}};}

async function loadData(){
  document.getElementById('loadingOverlay').classList.remove('hidden');
  try{
    const res=await fetch(API_URL+'?t='+Date.now());
    RAW=await res.json();
    names=Object.keys(RAW).filter(n=>RAW[n]&&RAW[n].length>0);
    const sel=document.getElementById('consultorSel');
    sel.innerHTML='';
    names.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});
    currentConsultor=names[0]||'';
    sel.value=currentConsultor;
    currentDay=getAllDates().slice(-1)[0]||'';
    document.getElementById('lastUpdate').textContent='Atualizado: '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){
    document.getElementById('chartsArea').innerHTML='<div style="background:#3B0D0D;border:1px solid #F05C5C;border-radius:12px;padding:1.5rem;text-align:center;color:#F05C5C;margin:2rem 0">⚠️ Não foi possível carregar os dados.</div>';
  }finally{document.getElementById('loadingOverlay').classList.add('hidden');}
}

function setView(v,btn){
  currentView=v;
  document.querySelectorAll('.ctrl-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const showMetrics=!['semana','metas','qualidade','diario'].includes(v);
  document.getElementById('metricTabs').style.display=showMetrics?'':'none';
  document.getElementById('consultorSel').style.display=v==='individual'?'':'none';
  render();
}
function setMetric(m,btn){currentMetric=m;document.querySelectorAll('.metric-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function render(){renderKPIs();if(currentView==='team')renderTeam();else if(currentView==='diario')renderDiario();else if(currentView==='individual')renderIndividual();else if(currentView==='semana')renderSemana();else if(currentView==='metas')renderMetas();else if(currentView==='qualidade')renderQualidade();}

// ── KPIs ─────────────────────────────────────────────────────
function renderKPIs(){
  const g=document.getElementById('kpiGrid');

  if(currentView==='diario'&&currentDay){
    // KPIs do dia selecionado
    const dayRows=names.map(n=>(RAW[n]||[]).find(r=>r.data===currentDay)).filter(Boolean);
    const tt=dayRows.reduce((s,r)=>s+(r.total||0),0);
    const tel=dayRows.reduce((s,r)=>s+(r.tel||0),0);
    const chat=dayRows.reduce((s,r)=>s+(r.chat||0),0);
    const zen=dayRows.reduce((s,r)=>s+(r.zen||0),0);
    const sup=dayRows.reduce((s,r)=>s+(r.supplier||0),0);
    const acimaMeta=dayRows.filter(r=>r.total>=META_DIA).length;
    const slaZenVals=dayRows.map(r=>r.sla_zen).filter(v=>v!==null&&typeof v==='number');
    const slaZen=slaZenVals.length?slaZenVals.reduce((a,b)=>a+b,0)/slaZenVals.length:null;
    const tmaT=dayRows.map(r=>timeToMin(r.tma_tel)).filter(x=>x&&x>0);
    const tmeT=dayRows.map(r=>timeToMin(r.tme_tel)).filter(x=>x&&x>0);
    const tmeC=dayRows.map(r=>timeToMin(r.tme_chat)).filter(x=>x&&x>0);
    const avgTmaT=tmaT.length?tmaT.reduce((a,b)=>a+b,0)/tmaT.length:null;
    const avgTmeT=tmeT.length?tmeT.reduce((a,b)=>a+b,0)/tmeT.length:null;
    const avgTmeC=tmeC.length?tmeC.reduce((a,b)=>a+b,0)/tmeC.length:null;
    g.innerHTML=`
      <div class="kpi-card blue"><div class="kpi-label">Total do dia</div><div class="kpi-value">${tt}</div><div class="kpi-sub">${dayRows.length} consultores</div></div>
      <div class="kpi-card green"><div class="kpi-label">Acima da Meta</div><div class="kpi-value">${acimaMeta}/${dayRows.length}</div><div class="kpi-sub">≥ ${META_DIA} atend.</div></div>
      <div class="kpi-card blue"><div class="kpi-label">Telefone</div><div class="kpi-value">${tel}</div><div class="kpi-sub2">TMA: ${fmtMin(avgTmaT)} · TME: ${fmtMin(avgTmeT)}</div></div>
      <div class="kpi-card green"><div class="kpi-label">WhatsApp</div><div class="kpi-value">${chat}</div><div class="kpi-sub2">TME: ${fmtMin(avgTmeC)}</div></div>
      <div class="kpi-card purple"><div class="kpi-label">Zendesk</div><div class="kpi-value">${zen}</div><div class="kpi-sub2">SLA: ${slaText(slaZen!==null?slaZen*100:null)}</div></div>
      <div class="kpi-card warn"><div class="kpi-label">Supplier</div><div class="kpi-value">${sup}</div><div class="kpi-sub2">SLA: ${(()=>{const slaSupD=dayRows.map(r=>r&&r.sla!==null?r.sla:null).filter(v=>v!==null&&typeof v==='number');const avg=slaSupD.length?slaSupD.reduce((a,b)=>a+b,0)/slaSupD.length:null;return slaText(avg!==null?avg*100:null);})()}</div></div>`;
    return;
  }

  if(currentView==='individual'){
    const n=currentConsultor;if(!n)return;
    const tt=totalFor(n,'total'),tel=totalFor(n,'tel'),chat=totalFor(n,'chat'),zen=totalFor(n,'zen'),sup=totalFor(n,'supplier');
    const sla=avgSLA(n,'sla_zen');const dias=(RAW[n]||[]).length;
    const metaDias=dias*META_DIA;const pctMeta=metaDias?Math.round(tt/metaDias*100):0;
    const tmaT=avgTMA(n,'tel'),tmeT=avgTME(n,'tel'),tmeC=avgTME(n,'chat'),tmaC=avgTMA(n,'chat');
    g.innerHTML=`
      <div class="kpi-card blue"><div class="kpi-label">Total</div><div class="kpi-value">${tt}</div><div class="kpi-sub">${dias} dias</div></div>
      <div class="kpi-card ${pctMeta>=100?'green':pctMeta>=70?'warn':'danger'}"><div class="kpi-label">Meta</div><div class="kpi-value">${pctMeta}%</div><div class="kpi-sub">${metaDias} total</div></div>
      <div class="kpi-card blue"><div class="kpi-label">Telefone</div><div class="kpi-value">${tel}</div><div class="kpi-sub2">TMA: ${fmtMin(tmaT)}</div><div class="kpi-sub2">TME: ${fmtMin(tmeT)}</div></div>
      <div class="kpi-card green"><div class="kpi-label">WhatsApp</div><div class="kpi-value">${chat}</div><div class="kpi-sub2">TMA: ${fmtMin(tmaC)}</div><div class="kpi-sub2">TME: ${fmtMin(tmeC)}</div></div>
      <div class="kpi-card purple"><div class="kpi-label">Zendesk</div><div class="kpi-value">${zen}</div><div class="kpi-sub2">SLA: ${slaText(sla!==null?sla*100:null)}</div></div>
      <div class="kpi-card warn"><div class="kpi-label">Supplier</div><div class="kpi-value">${sup}</div><div class="kpi-sub2">SLA: ${slaText(sla!==null?sla*100:null)}</div></div>`;
    return;
  }

  // Geral (team, semanas, metas, qualidade)
  const tt=names.reduce((s,n)=>s+totalFor(n,'total'),0);
  const tel=names.reduce((s,n)=>s+totalFor(n,'tel'),0);
  const chat=names.reduce((s,n)=>s+totalFor(n,'chat'),0);
  const zen=names.reduce((s,n)=>s+totalFor(n,'zen'),0);
  const sup=names.reduce((s,n)=>s+totalFor(n,'supplier'),0);
  const acimaMeta=names.filter(n=>{const d=RAW[n]||[];return d.length&&(totalFor(n,'total')/d.length)>=META_DIA;}).length;
  const tmaT=names.map(n=>avgTMA(n,'tel')).filter(v=>v!==null);
  const tmeT=names.map(n=>avgTME(n,'tel')).filter(v=>v!==null);
  const tmeC=names.map(n=>avgTME(n,'chat')).filter(v=>v!==null);

  const avgTmeTG=tmeT.length?tmeT.reduce((a,b)=>a+b,0)/tmeT.length:null;
  const avgTmeCG=tmeC.length?tmeC.reduce((a,b)=>a+b,0)/tmeC.length:null;

  const slaZenMedia=slaZenVals.length?slaZenVals.reduce((a,b)=>a+b,0)/slaZenVals.length:null;
  g.innerHTML=`
    <div class="kpi-card blue"><div class="kpi-label">Total Atendimentos</div><div class="kpi-value">${tt.toLocaleString('pt-BR')}</div><div class="kpi-sub">${getAllDates().length} dias · ${acimaMeta}/${names.length} na meta</div></div>

  const weeks=['S1','S2','S3','S4'];
  const teamWeeks={};weeks.forEach(w=>teamWeeks[w]=names.reduce((s,n)=>{const r=(RAW[n]||[]).filter(x=>getWeek(x.data)===w);return s+r.reduce((a,b)=>a+(b.total||0),0);},0));
  const consultorWeekData=names.map(n=>{const wt={};weeks.forEach(w=>wt[w]=0);(RAW[n]||[]).forEach(r=>{const w=getWeek(r.data);if(wt[w]!==undefined)wt[w]+=r.total||0;});return{n,...wt};}).filter(x=>weeks.some(w=>x[w]>0));
  document.getElementById('chartsArea').innerHTML=`
    <div class="chart-grid chart-grid-2" style="margin-bottom:14px">
      <div class="card">
        <div class="card-header"><div><div class="card-title">Volume por semana — time</div></div></div>
        <div class="chart-wrap" style="height:260px"><canvas id="semTeam"></canvas></div>
      </div>
      <div class="card">
        <div class="card-header"><div><div class="card-title">Comparativo por consultor</div><div class="legend" style="margin-top:6px">${weeks.map(w=>`<div class="legend-item"><span class="legend-dot" style="background:${WEEK_COLORS[w]}"></span>${WEEK_MAP[w]}</div>`).join('')}</div></div></div>
        <div class="chart-wrap" style="height:220px"><canvas id="semConsultor"></canvas></div>
      </div>
    </div>`;
  destroyChart('semTeam');
  charts['semTeam']=new Chart(document.getElementById('semTeam').getContext('2d'),{type:'bar',data:{labels:weeks.map(w=>WEEK_MAP[w]),datasets:[{data:weeks.map(w=>teamWeeks[w]),backgroundColor:weeks.map(w=>WEEK_COLORS[w]+'80'),borderColor:weeks.map(w=>WEEK_COLORS[w]),borderWidth:1.5,borderRadius:6}]},options:chartOpts(true)});
  destroyChart('semConsultor');
  const top8=consultorWeekData.sort((a,b)=>weeks.reduce((s,w)=>s+b[w]-a[w],0)).slice(0,8);
  charts['semConsultor']=new Chart(document.getElementById('semConsultor').getContext('2d'),{type:'bar',data:{labels:top8.map(x=>x.n.split(' ')[0]),datasets:weeks.map(w=>({label:WEEK_MAP[w],data:top8.map(x=>x[w]),backgroundColor:WEEK_COLORS[w]+'80',borderColor:WEEK_COLORS[w],borderWidth:1.5,borderRadius:3}))},options:{...chartOpts(true),plugins:{legend:{display:false}}}});
  document.getElementById('tableTitle').textContent='Produtividade por semana';
  document.getElementById('tableSub').textContent='Total de atendimentos por semana';
  const t=document.getElementById('mainTable');
  t.innerHTML=`<thead><tr><th>Consultor(a)</th>${weeks.map(w=>`<th>${WEEK_MAP[w]}</th>`).join('')}<th>Total</th></tr></thead>`;
  const tb=document.createElement('tbody');
  consultorWeekData.sort((a,b)=>weeks.reduce((s,w)=>s+b[w]-a[w],0)).forEach(x=>{
    const tot=weeks.reduce((s,w)=>s+x[w],0);
    tb.innerHTML+=`<tr><td style="font-weight:500">${x.n}</td>${weeks.map(w=>`<td class="num">${x[w]||0}</td>`).join('')}<td class="num" style="font-weight:600">${tot}</td></tr>`;
  });
  t.appendChild(tb);
}

// ── METAS ────────────────────────────────────────────────────
function renderMetas(){
  const consultorData=names.map(n=>{
    const d=RAW[n]||[];const dias=d.filter(r=>r.total>0).length||1;
    const media=totalFor(n,'total')/dias;
    const diasAcima=d.filter(r=>r.total>=META_DIA).length;
    const pctDias=d.length?Math.round(diasAcima/d.length*100):0;
    return{n,media:Math.round(media*10)/10,dias,diasAcima,pctDias,pct:Math.min(Math.round(media/META_DIA*100),150)};
  }).sort((a,b)=>b.media-a.media);
  document.getElementById('chartsArea').innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <div class="card-header"><div><div class="card-title">Atingimento da meta — ${META_DIA} atendimentos/dia</div></div></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px" id="metaCards"></div>
    </div>
    <div class="chart-grid chart-grid-2" style="margin-bottom:14px">
      <div class="card">
        <div class="card-header"><div><div class="card-title">Média diária por consultor</div></div></div>
        <div class="chart-wrap" style="height:260px"><canvas id="metaBar"></canvas></div>
      </div>
      <div class="card">
        <div class="card-header"><div><div class="card-title">% de dias acima da meta</div></div></div>
        <div class="chart-wrap" style="height:260px"><canvas id="metaDias"></canvas></div>
      </div>
    </div>`;
  const mc=document.getElementById('metaCards');
  consultorData.forEach(({n,media,dias,diasAcima,pct})=>{
    const color=pct>=100?'#F5C400':pct>=70?'#F59E0B':'#F05C5C';
    mc.innerHTML+=`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:600;font-size:13px">${n}</div><div style="font-size:13px;color:${color};font-family:'JetBrains Mono',monospace;font-weight:700">${media}/dia</div></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="meta-bar-wrap"><div class="meta-bar" style="width:${Math.min(pct,100)}%;background:${color}"></div></div><span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:${color};min-width:36px">${pct}%</span></div><div style="font-size:11px;color:var(--text3)">${diasAcima} de ${dias} dias acima da meta</div></div>`;
  });
  destroyChart('metaBar');
  charts['metaBar']=new Chart(document.getElementById('metaBar').getContext('2d'),{type:'bar',data:{labels:consultorData.map(x=>x.n.split(' ')[0]),datasets:[{label:'Meta',data:consultorData.map(()=>META_DIA),type:'line',borderColor:'#F59E0B80',borderDash:[6,3],borderWidth:2,pointRadius:0,fill:false},{label:'Média/dia',data:consultorData.map(x=>x.media),backgroundColor:consultorData.map(x=>x.media>=META_DIA?'#F5C40060':'#F05C5C60'),borderColor:consultorData.map(x=>x.media>=META_DIA?'#F5C400':'#F05C5C'),borderWidth:1.5,borderRadius:4}]},options:{...chartOpts(true),plugins:{legend:{display:false}}}});
  destroyChart('metaDias');
  charts['metaDias']=new Chart(document.getElementById('metaDias').getContext('2d'),{type:'bar',data:{labels:consultorData.map(x=>x.n.split(' ')[0]),datasets:[{data:consultorData.map(x=>x.pctDias),backgroundColor:consultorData.map(x=>x.pctDias>=70?'#F5C40060':'#F59E0B60'),borderColor:consultorData.map(x=>x.pctDias>=70?'#F5C400':'#F59E0B'),borderWidth:1.5,borderRadius:4}]},options:{...chartOpts(true),scales:{y:{min:0,max:100,ticks:{color:'#555E75',callback:v=>v+'%',font:{size:10}},grid:{color:'#2A3045'}},x:{ticks:{color:'#555E75',font:{size:10},maxRotation:45},grid:{display:false}}}}});
  document.getElementById('tableTitle').textContent='Ranking de metas';
  document.getElementById('tableSub').textContent='Média diária vs meta de '+META_DIA+'/dia';
  const t=document.getElementById('mainTable');
  t.innerHTML='<thead><tr><th>#</th><th>Consultor(a)</th><th>Dias</th><th>Média/dia</th><th>Dias acima meta</th><th>% dias</th><th>Atingimento</th></tr></thead>';
  const tb=document.createElement('tbody');
  consultorData.forEach(({n,media,dias,diasAcima,pctDias,pct},i)=>{
    tb.innerHTML+=`<tr><td class="num" style="color:var(--text3)">${i+1}</td><td style="font-weight:500">${n}</td><td class="num">${dias}</td><td class="num">${media}</td><td class="num">${diasAcima}</td><td class="num">${pctDias}%</td><td><span class="badge ${pct>=100?'badge-ok':pct>=70?'badge-warn':'badge-bad'}">${pct}%</span></td></tr>`;
  });
  t.appendChild(tb);
}

// ── QUALIDADE ────────────────────────────────────────────────
function renderQualidade(){
  document.getElementById('chartsArea').innerHTML=`
    <div class="chart-grid chart-grid-2" style="margin-bottom:14px">
      <div class="card">
        <div class="card-header"><div><div class="card-title">CSAT médio por consultor</div><div class="card-sub">Tel · WhatsApp · Zendesk</div></div></div>
        <div class="chart-wrap" style="height:280px"><canvas id="csatBar"></canvas></div>
      </div>
      <div class="card">
        <div class="card-header"><div><div class="card-title">TMA médio — Telefone vs WhatsApp</div><div class="card-sub">Tempo Médio de Atendimento (minutos)</div></div></div>
        <div class="chart-wrap" style="height:280px"><canvas id="tmaBar"></canvas></div>
      </div>
    </div>
    <div class="chart-grid chart-grid-2" style="margin-bottom:14px">
      <div class="card">
        <div class="card-header"><div><div class="card-title">TME — Telefone vs WhatsApp</div><div class="card-sub">Tempo Médio de Espera (minutos)</div></div></div>
        <div class="chart-wrap" style="height:240px"><canvas id="tmeBar"></canvas></div>
      </div>
      <div class="card">
        <div class="card-header"><div><div class="card-title">SLA Zendesk médio</div><div class="card-sub">Verde ≥90% · Amarelo ≥70%</div></div></div>
        <div class="chart-wrap" style="height:240px"><canvas id="qualSla"></canvas></div>
      </div>
    </div>`;

  const csatData=names.map(n=>({n,tel:avgCSAT(n,'tel'),chat:avgCSAT(n,'chat'),zen:avgCSAT(n,'zen')})).filter(x=>x.tel!==null||x.chat!==null||x.zen!==null).sort((a,b)=>{const av=v=>v===null?0:v;return(av(b.tel)+av(b.chat)+av(b.zen))-(av(a.tel)+av(a.chat)+av(a.zen));});
  destroyChart('csatBar');
  charts['csatBar']=new Chart(document.getElementById('csatBar').getContext('2d'),{type:'bar',data:{labels:csatData.map(x=>x.n.split(' ')[0]),datasets:[{label:'Telefone',data:csatData.map(x=>x.tel!==null?Math.round(x.tel*100):null),backgroundColor:'#2563EB60',borderColor:'#2563EB',borderWidth:1.5,borderRadius:3},{label:'WhatsApp',data:csatData.map(x=>x.chat!==null?Math.round(x.chat*100):null),backgroundColor:'#F5C40060',borderColor:'#F5C400',borderWidth:1.5,borderRadius:3},{label:'Zendesk',data:csatData.map(x=>x.zen!==null?Math.round(x.zen*100):null),backgroundColor:'#60A5FA60',borderColor:'#60A5FA',borderWidth:1.5,borderRadius:3}]},options:{...chartOpts(false),scales:{y:{min:0,max:100,ticks:{color:'#555E75',callback:v=>v+'%',font:{size:10}},grid:{color:'#2A3045'}},x:{ticks:{color:'#555E75',font:{size:10},maxRotation:45},grid:{display:false}}}}});

  const tmaData=names.map(n=>({n,tel:avgTMA(n,'tel'),chat:avgTMA(n,'chat')})).filter(x=>x.tel!==null||x.chat!==null).sort((a,b)=>(a.tel||0)-(b.tel||0));
  destroyChart('tmaBar');
  charts['tmaBar']=new Chart(document.getElementById('tmaBar').getContext('2d'),{type:'bar',data:{labels:tmaData.map(x=>x.n.split(' ')[0]),datasets:[{label:'TMA Tel (min)',data:tmaData.map(x=>x.tel!==null?Math.round(x.tel*10)/10:null),backgroundColor:'#2563EB60',borderColor:'#2563EB',borderWidth:1.5,borderRadius:3},{label:'TMA WhatsApp (min)',data:tmaData.map(x=>x.chat!==null?Math.round(x.chat*10)/10:null),backgroundColor:'#F5C40060',borderColor:'#F5C400',borderWidth:1.5,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#7A8EBF',font:{size:11},boxWidth:10}},tooltip:{backgroundColor:'#1E2333',borderColor:'#1A2F6A',borderWidth:1,titleColor:'#EFF3FF',bodyColor:'#7A8EBF',padding:10,callbacks:{label:function(ctx){const v=ctx.parsed.y;if(!v)return'';const tot=Math.round(v*60);const m=Math.floor(tot/60);const s=tot%60;return' '+ctx.dataset.label+': '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}}}},scales:{y:{beginAtZero:true,ticks:{color:'#3D4F80',font:{size:10},callback:function(v){const tot=Math.round(v*60);const m=Math.floor(tot/60);const s=tot%60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}},grid:{color:'#1A2F6A'}},x:{ticks:{color:'#3D4F80',font:{size:10},maxRotation:45},grid:{display:false}}}}}});

  const tmeData=names.map(n=>({n,tel:avgTME(n,'tel'),chat:avgTME(n,'chat')})).filter(x=>x.tel!==null||x.chat!==null).sort((a,b)=>(a.tel||0)-(b.tel||0));
  destroyChart('tmeBar');
  charts['tmeBar']=new Chart(document.getElementById('tmeBar').getContext('2d'),{type:'bar',data:{labels:tmeData.map(x=>x.n.split(' ')[0]),datasets:[{label:'TME Tel (min)',data:tmeData.map(x=>x.tel!==null?Math.round(x.tel*10)/10:null),backgroundColor:'#2563EB60',borderColor:'#2563EB',borderWidth:1.5,borderRadius:3},{label:'TME WhatsApp (min)',data:tmeData.map(x=>x.chat!==null?Math.round(x.chat*10)/10:null),backgroundColor:'#F5C40060',borderColor:'#F5C400',borderWidth:1.5,borderRadius:3}]},options:chartOpts(false)});

  destroyChart('qualSla');
  const slaData=names.map(n=>({n,v:avgSLA(n,'sla_zen')})).filter(x=>x.v!==null).map(x=>({n:x.n,v:x.v*100})).sort((a,b)=>b.v-a.v);
  charts['qualSla']=new Chart(document.getElementById('qualSla').getContext('2d'),{type:'bar',data:{labels:slaData.map(x=>x.n.split(' ')[0]),datasets:[{data:slaData.map(x=>Math.round(x.v)),backgroundColor:slaData.map(x=>x.v>=90?'#F5C40060':x.v>=70?'#F59E0B60':'#F05C5C60'),borderColor:slaData.map(x=>x.v>=90?'#F5C400':x.v>=70?'#F59E0B':'#F05C5C'),borderWidth:1.5,borderRadius:4}]},options:{...chartOpts(true),scales:{y:{min:0,max:100,ticks:{color:'#555E75',callback:v=>v+'%',font:{size:10}},grid:{color:'#2A3045'}},x:{ticks:{color:'#555E75',font:{size:10},maxRotation:45},grid:{display:false}}}}});

  document.getElementById('tableTitle').textContent='Indicadores de qualidade';
  document.getElementById('tableSub').textContent='CSAT, TMA, TME e SLA por consultor';
  const t=document.getElementById('mainTable');
  t.innerHTML='<thead><tr><th>Consultor(a)</th><th>CSAT Tel</th><th>CSAT Wpp</th><th>CSAT Zen</th><th>TMA Tel</th><th>TMA Wpp</th><th>TME Tel</th><th>TME Wpp</th><th>SLA Zen</th></tr></thead>';
  const tb=document.createElement('tbody');
  names.forEach(n=>{
    const ct=avgCSAT(n,'tel'),cc=avgCSAT(n,'chat'),cz=avgCSAT(n,'zen');
    const tmaT=avgTMA(n,'tel'),tmaC=avgTMA(n,'chat'),tmeT=avgTME(n,'tel'),tmeC=avgTME(n,'chat');
    const sla=avgSLA(n,'sla_zen');
    tb.innerHTML+=`<tr><td style="font-weight:500">${n}</td><td class="num">${ct!==null?Math.round(ct*100)+'%':'—'}</td><td class="num">${cc!==null?Math.round(cc*100)+'%':'—'}</td><td class="num">${cz!==null?Math.round(cz*100)+'%':'—'}</td><td class="num">${fmtMin(tmaT)}</td><td class="num">${fmtMin(tmaC)}</td><td class="num">${fmtMin(tmeT)}</td><td class="num">${fmtMin(tmeC)}</td><td><span class="badge ${slaClass(sla!==null?sla*100:null)}">${sla!==null?Math.round(sla*100)+'%':'N/A'}</span></td></tr>`;
  });
  t.appendChild(tb);
}

// ── TABLE ────────────────────────────────────────────────────
function renderTable(){
  const t=document.getElementById('mainTable');
  if(currentView==='individual'){
    const n=currentConsultor;
    document.getElementById('tableTitle').textContent=n+' — histórico diário';
    document.getElementById('tableSub').textContent='Detalhe por dia trabalhado';
    t.innerHTML='<thead><tr><th>Data</th><th>Total</th><th>Tel</th><th>TMA Tel</th><th>TME Tel</th><th>WhatsApp</th><th>TME Wpp</th><th>Zendesk</th><th>SLA Zen</th><th>Supplier</th><th>Meta</th></tr></thead>';
    const tb=document.createElement('tbody');
    (RAW[n]||[]).forEach(r=>{
      const ok=r.total>=META_DIA;
      const slaZen=r.sla_zen!==null&&typeof r.sla_zen==='number'?Math.round(r.sla_zen*100)+'%':'—';
      tb.innerHTML+=`<tr><td style="font-weight:500">${r.data}</td><td class="num" style="color:${ok?'#F5C400':'#F05C5C'};font-weight:600">${r.total}</td><td class="num">${r.tel}</td><td class="num">${fmtMin(timeToMin(r.tma_tel))}</td><td class="num">${fmtMin(timeToMin(r.tme_tel))}</td><td class="num">${r.chat}</td><td class="num">${fmtMin(timeToMin(r.tme_chat))}</td><td class="num">${r.zen}</td><td class="num">${slaZen}</td><td class="num">${r.supplier}</td><td><span class="badge ${ok?'badge-ok':'badge-bad'}">${ok?'✓':'✗'}</span></td></tr>`;
    });
    t.appendChild(tb);
  } else {
    document.getElementById('tableTitle').textContent='Ranking do Time';
    document.getElementById('tableSub').textContent='Total acumulado no período';
    t.innerHTML='<thead><tr><th>#</th><th>Consultor(a)</th><th>Dias</th><th>Total</th><th>Média/dia</th><th>Tel</th><th>WhatsApp</th><th>Zendesk</th><th>Supplier</th><th>SLA Zen</th></tr></thead>';
    const tb=document.createElement('tbody');
    names.map(n=>({n,total:totalFor(n,'total'),tel:totalFor(n,'tel'),chat:totalFor(n,'chat'),zen:totalFor(n,'zen'),sup:totalFor(n,'supplier'),sla:avgSLA(n,'sla_zen'),dias:(RAW[n]||[]).filter(r=>r.total>0).length}))
      .sort((a,b)=>b.total-a.total)
      .forEach((r,i)=>{
        const media=r.dias?Math.round(r.total/r.dias*10)/10:0;
        const ok=media>=META_DIA;
        const slaVal=r.sla!==null?Math.round(r.sla*100):null;
        tb.innerHTML+=`<tr><td class="num" style="color:var(--text3)">${i+1}</td><td style="font-weight:500">${r.n}</td><td class="num">${r.dias}</td><td class="num" style="font-weight:600">${r.total}</td><td class="num" style="color:${ok?'#F5C400':'#F05C5C'}">${media}</td><td class="num">${r.tel}</td><td class="num">${r.chat}</td><td class="num">${r.zen}</td><td class="num">${r.sup}</td><td><span class="badge ${slaClass(slaVal)}">${slaText(slaVal)}</span></td></tr>`;
      });
    t.appendChild(tb);
  }
}

loadData();
</script>
